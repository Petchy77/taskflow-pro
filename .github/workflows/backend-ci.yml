name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: taskflow
          MYSQL_USER: taskflow
          MYSQL_PASSWORD: taskflow123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: 🔍 Verify Maven & Java
        run: |
          mvn -version
          java -version

      - name: 🧪 Run unit tests
        working-directory: backend
        run: mvn -B test

      - name: 📊 Generate coverage report
        working-directory: backend
        run: mvn -B jacoco:report

      - name: 📤 Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: backend/target/site/jacoco/
          retention-days: 30

      - name: 📤 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: 📋 Test Summary
        if: always()
        run: |
          echo "## Test Results :test_tube:" >> $GITHUB_STEP_SUMMARY
          if [ -d backend/target/surefire-reports ]; then
            TOTAL=$(grep -h "tests=" backend/target/surefire-reports/*.xml | sed 's/.*tests="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
            FAILURES=$(grep -h "failures=" backend/target/surefire-reports/*.xml | sed 's/.*failures="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
            echo "- Total tests: **$TOTAL**" >> $GITHUB_STEP_SUMMARY
            echo "- Failures: **$FAILURES**" >> $GITHUB_STEP_SUMMARY
          fi

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: taskflow-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Image build summary
        run: |
          echo "## Docker Image :whale:" >> $GITHUB_STEP_SUMMARY
          echo "Image built successfully: \`taskflow-backend:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
