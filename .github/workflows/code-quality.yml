name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dependency-check:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: 🔒 Run dependency check
        working-directory: backend
        run: |
          mvn -B dependency:tree | tee dependency-tree.txt
          echo "## Dependencies :package:" >> $GITHUB_STEP_SUMMARY
          echo "Total dependencies analyzed" >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload dependency tree
        uses: actions/upload-artifact@v4
        with:
          name: dependency-tree
          path: backend/dependency-tree.txt
          retention-days: 7
