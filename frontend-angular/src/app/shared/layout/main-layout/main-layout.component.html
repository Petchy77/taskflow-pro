<div class="min-h-screen bg-gray-50 flex">
  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
    <div class="p-6 border-b border-gray-200">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-primary-600 rounded-lg flex items-center justify-center text-2xl">
          🚀
        </div>
        <div>
          <h1 class="font-bold text-gray-900">TaskFlow</h1>
          <p class="text-xs text-gray-500">Pro Edition</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 p-4 space-y-1">
      <a routerLink="/dashboard"
         routerLinkActive="bg-primary-50 text-primary-700"
         [routerLinkActiveOptions]="{ exact: true }"
         class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-700 hover:bg-gray-100 transition">
        <lucide-icon [img]="DashboardIcon" [size]="20" />
        <span class="font-medium">Dashboard</span>
      </a>

      <a routerLink="/tasks"
         routerLinkActive="bg-primary-50 text-primary-700"
         class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-700 hover:bg-gray-100 transition">
        <lucide-icon [img]="TasksIcon" [size]="20" />
        <span class="font-medium">Tasks</span>
      </a>
    </nav>

    <div class="p-4 border-t border-gray-200">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 bg-gradient-to-br from-primary-500 to-primary-700 rounded-full flex items-center justify-center text-white font-semibold">
          {{ userInitials() }}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-900 truncate">{{ user()?.fullName }}</p>
          <p class="text-xs text-gray-500 truncate">{{ user()?.role }}</p>
        </div>
      </div>
      <button (click)="logout()"
              class="w-full flex items-center justify-center gap-2 px-3 py-2 text-sm text-gray-700 hover:bg-gray-100 rounded-lg transition">
        <lucide-icon [img]="LogOutIcon" [size]="16" />
        <span>Sign out</span>
      </button>
    </div>
  </aside>

  <main class="flex-1 overflow-auto">
    <router-outlet />
  </main>
</div>
