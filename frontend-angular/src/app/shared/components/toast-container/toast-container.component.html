<div class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none">
  @for (toast of toasts(); track toast.id) {
    <div
      [class]="toastClass(toast.type)"
      class="pointer-events-auto flex items-start gap-3 px-4 py-3 rounded-lg border shadow-lg min-w-[300px] max-w-md animate-slide-in">

      <lucide-icon
        [img]="iconFor(toast.type)"
        [class]="iconColor(toast.type)"
        [size]="20"
        class="mt-0.5 flex-shrink-0" />

      <p class="flex-1 text-sm font-medium">{{ toast.message }}</p>

      <button
        (click)="dismiss(toast.id)"
        class="flex-shrink-0 hover:opacity-70 transition">
        <lucide-icon [img]="XIcon" [size]="16" />
      </button>
    </div>
  }
</div>
