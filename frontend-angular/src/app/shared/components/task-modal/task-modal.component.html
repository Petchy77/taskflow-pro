@if (isOpen) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-gray-900/50 backdrop-blur-sm" (click)="onClose()"></div>

    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-gray-900">Create New Task</h2>
        <button (click)="onClose()" class="p-1 hover:bg-gray-100 rounded-lg transition">
          <lucide-icon [img]="XIcon" [size]="20" class="text-gray-500" />
        </button>
      </div>

      @if (errorMessage()) {
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
          {{ errorMessage() }}
        </div>
      }

      <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">
            Title <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            formControlName="title"
            placeholder="What needs to be done?"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition" />
          @if (taskForm.get('title')?.touched && taskForm.get('title')?.errors) {
            <p class="text-xs text-red-600 mt-1">Title must be at least 3 characters</p>
          }
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
          <textarea
            formControlName="description"
            rows="3"
            placeholder="Add more details (optional)"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition resize-none"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">
              Project <span class="text-red-500">*</span>
            </label>
            <select
              formControlName="projectId"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition">
              @for (project of projects(); track project.id) {
                <option [value]="project.id">{{ project.name }}</option>
              }
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">
              Priority <span class="text-red-500">*</span>
            </label>
            <select
              formControlName="priority"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition">
              <option value="LOW">🟢 Low</option>
              <option value="MEDIUM">🔵 Medium</option>
              <option value="HIGH">🟠 High</option>
              <option value="URGENT">🔴 Urgent</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Due Date</label>
          <input
            type="date"
            formControlName="dueDate"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition" />
        </div>

        <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-100">
          <button
            type="button"
            (click)="onClose()"
            class="px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-lg transition">
            Cancel
          </button>
          <button
            type="submit"
            [disabled]="taskForm.invalid || isSubmitting()"
            class="px-5 py-2 bg-primary-600 hover:bg-primary-700 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium rounded-lg transition shadow-sm">
            @if (isSubmitting()) {
              <span>Creating...</span>
            } @else {
              <span>Create Task</span>
            }
          </button>
        </div>
      </form>
    </div>
  </div>
}
