spring:
  application:
    name: taskflow-backend
  profiles:
    active: dev

  # Database connection
  datasource:
    url: jdbc:mysql://localhost:3306/taskflow?useSSL=false&serverTimezone=Asia/Bangkok&allowPublicKeyRetrieval=true
    username: taskflow
    password: taskflow123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate    # ใช้ Flyway แทน ไม่ให้ Hibernate สร้าง table เอง
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  # Flyway (database migration)
  # Flyway (database migration)
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

# Server config
server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# Actuator + Prometheus monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      access: unrestricted
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# JWT config
app:
  jwt:
    secret: ${JWT_SECRET:mySuperSecretKeyThatShouldBeAtLeast256BitsLongForHS256Algorithm}
    expiration: 86400000  # 24 hours in milliseconds

# Logging
logging:
  level:
    com.taskflow: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
